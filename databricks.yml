# databricks.yml
# Databricks Asset Bundle configuration for DataBricks-Sample1
# Note: This project is configured for local development without Azure account
# When you have Azure Databricks access, update the workspace host below

bundle:
  name: DataBricks-Sample1

include:
  - resources/*.yml

variables:
  catalog:
    description: The catalog to use
    default: main
  schema:
    description: The schema to use
    default: default

# Workspace configuration - update these when you have Azure Databricks access
workspace:
  # Uncomment and update when you have Databricks workspace
  # host: https://adb-xxxxxxxxxxxx.x.azuredatabricks.net

targets:
  # Development target for local development
  local:
    mode: development
    default: true
    variables:
      catalog: local_dev
      schema: default

  # Development target - requires Azure Databricks workspace
  dev:
    mode: development
    workspace:
      # Update with your workspace URL
      host: ${var.DATABRICKS_HOST}
    variables:
      catalog: dev
      schema: ${bundle.name}

  # Production target - requires Azure Databricks workspace  
  prod:
    mode: production
    workspace:
      host: ${var.DATABRICKS_HOST}
      root_path: /Shared/.bundle/prod/${bundle.name}
    variables:
      catalog: prod
      schema: ${bundle.name}
